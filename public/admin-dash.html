<!DOCTYPE html>
<!-- Admin dashboard — protected route, accessible only to admin users.
     Contains tabs for Overview, Spots, Bookings, Users, Spot Requests, Analytics, and PQR.
     admin.js loads all data and handles tab switching. -->
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - PARKLY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body
    class="flex flex-col min-h-screen bg-background text-foreground font-sans antialiased transition-colors duration-300">

    <header class="sticky top-0 z-50 border-b border-border bg-background/80 backdrop-blur-md px-6 py-3">
        <nav class="flex items-center justify-between gap-4" aria-label="Main Navigation">
            <a href="index.html" class="flex items-center gap-2 mr-8 group" aria-label="Home">
                <div class="bg-primary/10 p-1 rounded-lg group-hover:bg-primary/20 transition-colors">
                    <i data-lucide="circle-parking"
                        class="h-6 w-6 text-primary group-hover:scale-110 transition-transform"></i>
                </div>
                <span class="text-xl font-black tracking-tighter text-foreground">PARK<span
                        class="text-primary">LY</span></span>
            </a>

            <div class="flex-1 max-w-xl hidden md:block">
                <div class="relative group">
                    <i data-lucide="search"
                        class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-foreground group-focus-within:text-primary transition-colors"></i>
                    <input type="text" id="admin-table-filter" placeholder="Search users, spots, or bookings..."
                        class="w-full bg-input border border-border rounded-xl py-2 pl-10 pr-4 text-sm text-foreground focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all">
                </div>
            </div>

            <div class="flex items-center gap-4">
                <button id="btn-nav-search"
                    class="hidden md:flex items-center gap-2 px-4 py-2 bg-primary/5 text-primary-light hover:bg-primary/10 rounded-xl text-sm font-bold transition-all border border-primary/15">
                    <i data-lucide="compass" class="w-4 h-4"></i> View App
                </button>
                <button id="theme-toggle" aria-label="Toggle theme"
                    class="p-2 rounded-lg bg-input border border-border hover:border-primary/50 transition-all"></button>
                <div class="h-8 w-px bg-card mx-1"></div>
                <div class="flex items-center gap-3">
                    <div class="text-right hidden sm:block">
                        <p class="text-sm font-bold text-foreground leading-none">Admin Panel</p>
                        <p class="text-[10px] text-primary uppercase font-black tracking-widest mt-0.5">Superuser</p>
                    </div>
                    <div
                        class="w-9 h-9 rounded-xl bg-gradient-to-tr from-primary to-primary-dark flex items-center justify-center text-foreground font-bold shadow-lg shadow-primary/20">
                        A
                    </div>
                </div>
                <button id="btn-logout"
                    class="p-2 text-foreground hover:text-red-600 dark:hover:text-red-400 hover:bg-red-400/10 rounded-lg transition-colors ml-2">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
        </nav>
    </header>

    <!-- ── ADMIN DASHBOARD MAIN CONTAINER ───────────────────────────────────── -->
    <main class="flex-1 p-6 max-w-7xl mx-auto w-full">
        
        <!-- Dashboard Header -->
        <header class="mb-8">
            <h1 class="text-2xl font-black text-foreground mb-2">Control Center</h1>
            <p class="text-sm text-foreground font-medium opacity-80">Manage the entire platform from one place.</p>
        </header>

        <!-- ── TAB NAVIGATION (Dynamically toggles section visibility via admin.js) ── -->
        <nav id="tabs-container" class="flex overflow-x-auto border-b border-border mb-8 scrollbar-hide"
            aria-label="Admin Sections">
            <button data-tab="summary"
                class="tab-btn active-tab flex items-center gap-2 px-6 py-2.5 text-sm font-bold border-b-2 border-primary text-primary transition-all"
                role="tab">
                Overview
            </button>
            <button data-tab="spots"
                class="tab-btn flex items-center gap-2 px-6 py-2.5 text-sm font-medium border-b-2 border-transparent text-foreground/90 font-medium hover:text-foreground transition-all"
                role="tab">
                Spots <span id="badge-spots"
                    class="ml-1.5 bg-card text-foreground font-semibold text-[10px] px-1.5 py-0.5 rounded-full font-bold">0</span>
            </button>
            <button data-tab="reservations"
                class="tab-btn flex items-center gap-2 px-6 py-2.5 text-sm font-medium border-b-2 border-transparent text-foreground/90 font-medium hover:text-foreground transition-all"
                role="tab">
                Bookings <span id="badge-reservations"
                    class="ml-1.5 bg-card text-foreground font-semibold text-[10px] px-1.5 py-0.5 rounded-full font-bold">0</span>
            </button>
            <button data-tab="users"
                class="tab-btn flex items-center gap-2 px-6 py-2.5 text-sm font-medium border-b-2 border-transparent text-foreground/90 font-medium hover:text-foreground transition-all"
                role="tab">
                Users <span id="badge-users"
                    class="ml-1.5 bg-card text-foreground font-semibold text-[10px] px-1.5 py-0.5 rounded-full font-bold">0</span>
            </button>
            <button data-tab="requests"
                class="tab-btn flex items-center gap-2 px-6 py-2.5 text-sm font-medium border-b-2 border-transparent text-foreground font-medium opacity-70 hover:opacity-100 transition-all"
                role="tab">
                Spot Requests <span id="badge-requests"
                    class="ml-1.5 bg-yellow-100 dark:bg-yellow-900/50 text-yellow-700 dark:text-yellow-400 text-[10px] px-1.5 py-0.5 rounded-full font-bold border border-yellow-200 dark:border-transparent">0</span>
            </button>
            <button data-tab="analytics"
                class="tab-btn flex items-center gap-2 px-6 py-2.5 text-sm font-medium border-b-2 border-transparent text-foreground/90 font-medium hover:text-foreground transition-all"
                role="tab">
                📊 Analytics
            </button>
            <button data-tab="pqr"
                class="tab-btn flex items-center gap-2 px-6 py-2.5 text-sm font-medium border-b-2 border-transparent text-foreground font-medium opacity-70 hover:opacity-100 transition-all"
                role="tab">
                PQR <span id="badge-pqr"
                    class="ml-1.5 bg-red-100 dark:bg-red-900/50 text-red-700 dark:text-red-400 text-[10px] px-1.5 py-0.5 rounded-full font-bold border border-red-200 dark:border-transparent">0</span>
            </button>
