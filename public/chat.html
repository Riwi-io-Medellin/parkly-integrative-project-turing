<!DOCTYPE html>
<!-- Chat page — two views in one file: the hub (list of all conversations) and
     the individual chat view (messages). chat.js swaps between them without reloading. -->
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages — PARKLY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="IA/chatbox.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-background text-foreground min-h-screen font-sans antialiased flex flex-col">

    <header class="sticky top-0 z-50 border-b border-border bg-background/80 backdrop-blur-xl px-4 py-3">
        <nav class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button id="nav-back-btn"
                    class="p-2 rounded-lg border border-border hover:border-primary/50 text-foreground font-semibold hover:text-foreground transition-colors"
                    aria-label="Back">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                </button>
                <div id="header-chat-info" class="flex items-center gap-3 hidden">
                    <div
                        class="w-10 h-10 rounded-full bg-card border border-border overflow-hidden flex items-center justify-center">
                        <img id="chat-partner-img" src="" class="w-full h-full object-cover hidden">
                        <span id="chat-partner-initial" class="text-xs font-black text-foreground/90">?</span>
                    </div>
                    <div>
                        <h1 id="chat-partner-display-name" class="text-sm font-bold text-foreground leading-tight">...
                        </h1>
                        <p id="chat-context" class="text-[10px] text-foreground font-semibold">Loading...</p>
                    </div>
                </div>
                <h1 id="header-hub-title" class="text-lg font-bold text-foreground">Messages</h1>
            </div>

            <div class="flex items-center gap-3">
                <button id="theme-toggle" aria-label="Toggle theme"
                    class="p-2 rounded-lg border border-border hover:border-primary/50 transition-colors">
                    <i data-lucide="moon" class="w-4 h-4 text-foreground font-medium"></i>
                </button>
            </div>
        </nav>
    </header>

    <main id="main-content" class="flex-1 max-w-4xl w-full mx-auto px-4 py-6 flex flex-col">

        <!-- View 1: Chat Hub (List of all active conversations pulled from database) -->
        <section id="chat-hub-view" class="animate-fade-in">
            <div id="chat-list-container" class="grid gap-3">
                <div class="animate-pulse bg-card/50 h-20 rounded-2xl"></div>
                <div class="animate-pulse bg-card/50 h-20 rounded-2xl"></div>
                <div class="animate-pulse bg-card/50 h-20 rounded-2xl"></div>
            </div>
        </section>

        <!-- View 2: Individual Chat (Messages view for a specific conversation) -->
        <section id="individual-chat-view" class="hidden flex-1 flex flex-col justify-end">
            <div id="chat-messages" class="space-y-4 overflow-y-auto mb-6 scroll-smooth pr-2">
                <!-- Messages go here -->
            </div>
        </section>

    </main>

    <footer id="chat-footer"
        class="hidden sticky bottom-0 bg-background/90 backdrop-blur-md border-t border-border p-4">
        <form id="chat-form" class="max-w-4xl mx-auto flex items-end gap-2">
            <div class="relative flex-1">
                <textarea id="chat-input" rows="1" placeholder="Type your message..."
                    class="w-full bg-input border border-border rounded-2xl pl-4 pr-12 py-3 text-sm text-foreground focus:outline-none focus:border-primary/60 transition-colors resize-none max-h-32"
                    required></textarea>
                <button type="button"
                    class="absolute right-2 bottom-2 p-1.5 text-foreground/90 hover:text-primary transition-colors">
                    <i data-lucide="paperclip" class="w-4 h-4"></i>
                </button>
            </div>
            <button type="submit" id="chat-send-btn"
                class="w-11 h-11 shrink-0 bg-primary hover:opacity-90 flex items-center justify-center text-primary-foreground rounded-2xl shadow-lg transition-transform active:scale-95 disabled:opacity-50">
                <i data-lucide="send" class="w-4 h-4 mr-0.5 mt-0.5"></i>
            </button>
        </form>
    </footer>

    <!-- ── DYNAMIC JAVASCRIPT TEMPLATES ─────────────────────────────────────── -->
    
    <!-- Template: Individual chat thread item in the Chat Hub list -->
    <template id="tpl-chat-item">
        <div
            class="chat-item bg-card border border-border p-4 rounded-2xl flex items-center gap-4 hover:border-primary/50 transition-all cursor-pointer group">
            <div
                class="w-12 h-12 rounded-full overflow-hidden flex-shrink-0 bg-card border-2 border-border flex items-center justify-center">
                <img class="item-avatar w-full h-full object-cover hidden" src="" alt="">
                <span class="item-initials text-xs font-bold text-foreground/90">?</span>
            </div>
            <div class="flex-1 min-w-0">
                <div class="flex justify-between items-start">
                    <h3 class="item-name font-bold text-foreground text-sm truncate"></h3>
                    <span class="item-time text-[10px] text-foreground/90"></span>
                </div>
                <p class="item-context text-[10px] text-primary font-bold uppercase tracking-widest mt-0.5"></p>
                <p class="item-last-msg text-xs text-foreground font-semibold truncate mt-1"></p>
            </div>
            <i data-lucide="chevron-right"
                class="w-4 h-4 text-foreground/90 group-hover:text-primary transition-colors"></i>
        </div>
    </template>

    <!-- Template: Empty state when user has no active chats -->
    <template id="tpl-chat-empty-hub">
        <div class="text-center py-20 text-foreground/90">
            <div class="w-16 h-16 bg-card rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i data-lucide="message-square" class="w-8 h-8 opacity-20"></i>
            </div>
            <p class="font-bold text-foreground mb-1">No messages yet</p>
            <p class="text-sm px-10">When you book a spot or receive a booking, you can chat here.</p>
        </div>
    </template>

    <!-- Template: A message sent by the current logged-in user (Right aligned, colored bubble) -->
    <template id="tpl-msg-sent">
        <div class="flex justify-end pr-2">
            <div class="max-w-[75%]">
                <div class="bg-primary text-primary-foreground text-sm px-4 py-2.5 rounded-2xl rounded-br-sm shadow-md">
                    <p class="msg-text whitespace-pre-wrap word-break-words"></p>
                </div>
                <div class="flex justify-end gap-1 mt-1 text-[10px] text-foreground/90">
                    <span class="msg-time"></span>
                    <i data-lucide="check-check" class="w-3 h-3 text-primary"></i>
                </div>
            </div>
        </div>
    </template>

    <!-- Template: A message received from the chat partner (Left aligned, neutral bubble) -->
    <template id="tpl-msg-received">
        <div class="flex justify-start pl-2">
            <div class="max-w-[75%]">
                <div
                    class="bg-card text-foreground text-sm px-4 py-2.5 rounded-2xl rounded-bl-sm border border-border shadow-sm">
                    <p class="msg-text whitespace-pre-wrap word-break-words"></p>
                </div>
                <div class="flex justify-start mt-1 text-[10px] text-foreground/90">
                    <span class="msg-time"></span>
                </div>
            </div>
        </div>
    </template>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/chat.js"></script>

    <!-- SweetAlert2 + Parkly Custom Alerts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/alerts.js"></script>

</body>

</html>
