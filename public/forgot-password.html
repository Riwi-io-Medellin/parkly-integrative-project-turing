<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - PARKLY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./js/tailwind-config.js"></script>
    <link rel="stylesheet" href="./css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        (function () {
            const theme = localStorage.getItem('parkly_theme') || 'dark';
            document.documentElement.classList.toggle('dark', theme === 'dark');
        })();
    </script>
</head>

<body class="flex items-center justify-center min-h-screen px-4 bg-background transition-colors duration-300">
    <main class="w-full max-w-[420px]">
        <nav aria-label="Return to Login" class="mb-8">
            <a href="login.html"
                class="flex items-center gap-2 text-sm text-foreground/90 hover:text-foreground transition-colors group font-bold">
                <i data-lucide="arrow-left" class="w-4 h-4 group-hover:-translate-x-1 transition-transform"></i>
                Back to login
            </a>
        </nav>

        <header class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-primary/10 mb-4">
                <i data-lucide="key-round" class="w-6 h-6 text-primary"></i>
            </div>
            <h1 class="text-2xl font-bold text-foreground mb-2 tracking-tight">Forgot Password?</h1>
            <p class="text-foreground/85 text-sm">Enter your email and we'll send you a reset link.</p>
        </header>

        <form id="forgot-form" class="space-y-4">
            <div class="space-y-1.5">
                <label for="email" class="text-sm font-bold text-foreground ml-1">Email Address</label>
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-3 top-3 text-foreground/90 font-bold w-4 h-4"></i>
                    <input type="email" id="email"
                        class="w-full bg-input border border-border rounded-xl py-2.5 pl-10 pr-4 text-sm text-foreground focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary transition-all placeholder-gray-500"
                        placeholder="your@email.com" required>
                </div>
            </div>
            <button type="submit"
                class="w-full bg-primary hover:bg-primary-dark text-primary-foreground font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-primary/20 mt-2 transform active:scale-[0.98]">
                Send Reset Link
            </button>
        </form>

        <div id="status-message" class="hidden mt-6 p-4 rounded-xl border text-sm text-center"></div>
    </main>

    <script src="js/forgot-password.js"></script>
    <script>lucide.createIcons();</script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/alerts.js"></script>
</body>

</html>
