<!DOCTYPE html>
<!-- Register page — two-step flow: Step 1 picks a role (Driver / Owner),
     Step 2 shows the registration form for that role. auth.js drives the logic. -->
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - PARKLY</title>

    <!-- Tailwind CSS from CDN + our custom design token config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>

    <!-- Global stylesheet for animations, toggles, and component overrides -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Lucide icons — rendered after DOM load via lucide.createIcons() -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="flex items-center justify-center min-h-screen px-4 bg-background py-10 transition-colors duration-300">

    <!-- Centered card container — 480px max so the form doesn't stretch on wide screens -->
    <main class="w-full max-w-[480px]">

        <!-- Back button — in Step 1 it goes to login.html; in Step 2 auth.js makes it go back to Step 1 -->
        <nav aria-label="Back">
            <button id="btn-back" class="flex items-center gap-2 text-sm text-foreground/80 font-bold hover:text-foreground mb-8 transition-colors group">
                <i data-lucide="arrow-left" class="w-4 h-4 group-hover:-translate-x-1 transition-transform"></i>
                <!-- auth.js dynamically updates this text depending on which step the user is on -->
                <span id="back-text">Back to login</span>
            </button>
        </nav>

        <!-- Page header: icon + title + subtitle — auth.js updates page-title and page-desc when going to Step 2 -->
        <header class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-primary/10 mb-4">
                <i data-lucide="parking-circle" class="w-6 h-6 text-primary"></i>
            </div>
            <h1 id="page-title" class="text-2xl font-bold text-foreground mb-2 tracking-tight">Create Account</h1>
            <p id="page-desc" class="text-foreground font-medium text-sm">Select your account type to start</p>
        </header>

        <!-- Step progress indicator — two numbered circles connected by a progress bar.
             auth.js fills the progress bar and highlights circle 2 when the user moves to Step 2. -->
        <section class="flex items-center justify-center gap-2 mb-10 px-10" aria-label="Registration Progress">
            <!-- Circle 1 starts filled (active) -->
            <div id="step-1-indicator" class="flex items-center justify-center w-8 h-8 rounded-full bg-primary text-primary-foreground text-xs font-bold ring-4 ring-background">1</div>
            <!-- The bar fills from left to right as the user advances -->
            <div class="h-1 flex-1 bg-border rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full w-0 bg-primary transition-all duration-300"></div>
            </div>
            <!-- Circle 2 starts hollow (inactive) -->
            <div id="step-2-indicator" class="flex items-center justify-center w-8 h-8 rounded-full bg-card border border-border text-foreground/80 font-bold text-xs font-bold ring-4 ring-background">2</div>
        </section>

        <!-- ── STEP 1: Role selector ──────────────────────────────────────────────── -->
        <!-- The user picks Driver or Owner; auth.js stores the choice and reveals Step 2 -->
        <section id="step-1" class="space-y-4 animate-fade-in">
            <h2 class="text-sm font-semibold text-foreground/90 mb-4">What type of account do you need?</h2>

            <!-- Driver card — clicking this sets role to "client" and goes to Step 2 -->
            <button id="btn-role-client" class="w-full flex items-center gap-4 p-5 rounded-2xl border border-border bg-card hover:border-primary/50 hover:bg-card transition-all group text-left">
                <div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center text-primary-light group-hover:bg-primary group-hover:text-primary-foreground transition-colors">
                    <i data-lucide="car" class="w-6 h-6"></i>
                </div>
                <div>
                    <h3 class="font-bold text-foreground text-base">Driver</h3>
                    <p class="text-sm text-foreground font-medium">Find and book parking spots</p>
                </div>
            </button>

            <!-- Owner card — clicking this sets role to "owner" and goes to Step 2 -->
            <button id="btn-role-owner" class="w-full flex items-center gap-4 p-5 rounded-2xl border border-border bg-card hover:border-primary/50 hover:bg-card transition-all group text-left">
                <div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center text-primary-light group-hover:bg-primary group-hover:text-primary-foreground transition-colors">
                    <i data-lucide="building-2" class="w-6 h-6"></i>
                </div>
                <div>
                    <h3 class="font-bold text-foreground text-base">Property Owner</h3>
                    <p class="text-sm text-foreground font-medium">I have spaces to rent</p>
                </div>
            </button>
        </section>

        <!-- ── STEP 2: Registration form ──────────────────────────────────────────── -->
        <!-- Hidden at first; auth.js shows this section after the role is selected -->
        <section id="step-2" class="hidden animate-fade-in">

            <!-- Role reminder banner — shows the selected role so users know what they picked -->
            <div class="bg-primary/10 border border-primary/20 rounded-xl p-3 flex items-center gap-3 mb-6">
                <div class="p-1.5 bg-primary rounded-lg text-primary-foreground">
                    <!-- auth.js swaps this icon between 'car' and 'building-2' based on the role -->
                    <i id="role-icon" data-lucide="car" class="w-4 h-4"></i>
                </div>
                <p class="text-sm text-primary font-semibold">Registering as <span id="role-label">Driver</span></p>
            </div>

            <!-- Registration form — auth.js intercepts submit, reads selected-role, and calls POST /api/auth/register -->
            <form id="register-form" class="space-y-4">

                <!-- Hidden input that stores the chosen role ('client' or 'owner') for the API call -->
                <input type="hidden" id="selected-role">

                <!-- Full name field -->
                <div class="space-y-1.5">
                    <label for="name" class="text-xs font-semibold text-foreground font-medium ml-1">Full Name</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-3 top-3 text-foreground/80 font-bold w-4 h-4"></i>
                        <input type="text" id="name" class="w-full bg-input border border-border rounded-xl py-2.5 pl-10 pr-4 text-sm text-foreground focus:border-primary focus:outline-none transition-all placeholder-gray-600" placeholder="John Doe" required>
                    </div>
                </div>

                <!-- Email field -->
                <div class="space-y-1.5">
                    <label for="reg-email" class="text-xs font-semibold text-foreground font-medium ml-1">Email</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-3 top-3 text-foreground/80 font-bold w-4 h-4"></i>
                        <input type="email" id="reg-email" class="w-full bg-input border border-border rounded-xl py-2.5 pl-10 pr-4 text-sm text-foreground focus:border-primary focus:outline-none transition-all placeholder-gray-600" placeholder="you@email.com" required>
                    </div>
                </div>

                <!-- Password + confirm in a two-column layout to save vertical space -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label for="reg-password" class="text-xs font-semibold text-foreground font-medium ml-1">Password</label>
                        <!-- minlength="6" is enforced both here (browser) and on the backend -->
                        <input type="password" id="reg-password" class="w-full bg-input border border-border rounded-xl py-2.5 px-4 text-sm text-foreground focus:border-primary transition-all placeholder-gray-600" placeholder="Min 6 chars" required minlength="6">
                    </div>
                    <div class="space-y-1.5">
                        <label for="confirm-password" class="text-xs font-semibold text-foreground font-medium ml-1">Confirm</label>
                        <!-- auth.js compares this with reg-password before submitting -->
                        <input type="password" id="confirm-password" class="w-full bg-input border border-border rounded-xl py-2.5 px-4 text-sm text-foreground focus:border-primary transition-all placeholder-gray-600" placeholder="Repeat" required>
                    </div>
                </div>

                <!-- Terms checkbox — form cannot submit unless this is checked (required attribute) -->
                <div class="flex items-start gap-3 p-3 rounded-xl border border-border bg-card/50 mt-2">
                    <input type="checkbox" id="terms-checkbox" class="mt-0.5 w-4 h-4 accent-primary cursor-pointer flex-shrink-0" required>
                    <label for="terms-checkbox" class="text-xs text-foreground/80 font-medium cursor-pointer leading-relaxed">
                        I have read and accept the
                        <!-- Opens legalidad.html in a new tab so the user doesn't lose their form data -->
                        <a href="legalidad.html" target="_blank" class="text-primary font-semibold hover:underline">Parkly Terms and Conditions</a>
                    </label>
                </div>

                <!-- Submit button — auth.js shows a loading state while the API call is in-flight -->
                <button type="submit" class="w-full bg-primary hover:bg-primary-dark text-primary-foreground font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-primary/20 mt-4 transform active:scale-[0.98]">
                    Create Account
                </button>
            </form>

            <!-- Alternative Google sign-up section — same OAuth flow as on the login page -->
            <div class="mt-6">
                <!-- Visual divider between the form and social login option -->
                <div class="relative mb-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-border"></div>
                    </div>
                    <div class="relative flex justify-center text-xs uppercase">
                        <span class="px-2 bg-background text-foreground/80 font-bold">Or continue with</span>
                    </div>
                </div>

                <!-- Google button — google-auth.js handles the Firebase popup flow on click -->
                <button type="button" id="btn-google-login" class="w-full flex items-center justify-center gap-3 px-4 py-3 border border-border rounded-xl bg-card hover:bg-border hover:border-border/80 transition-all text-foreground font-medium shadow-lg group">
                    <svg class="w-5 h-5 group-hover:scale-110 transition-transform" viewBox="0 0 24 24">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4" />
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" />
                        <path d="M5.84 14.11c-.22-.66-.35-1.36-.35-2.11s.13-1.45.35-2.11V7.05H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.95l3.66-2.84z" fill="#FBBC05" />
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.05l3.66 2.84c.87-2.6 3.3-4.51 6.16-4.51z" fill="#EA4335" />
                    </svg>
                    Google
                </button>
            </div>

        </section>
    </main>

    <!-- session.js checks if there's already a session and redirects before any other script runs -->
    <script src="js/session.js"></script>
    <!-- data.js provides the API base URL and shared fetch helpers -->
    <script src="js/data.js"></script>
    <!-- app.js handles shared UI like theme toggling -->
    <script src="js/app.js"></script>
    <!-- auth.js contains all the register logic: role selection, form validation, API call -->
    <script src="js/auth.js"></script>
    <!-- google-auth.js is loaded as an ES module because it uses Firebase's import statements -->
    <script type="module" src="js/google-auth.js"></script>
    <!-- Converts data-lucide="..." attributes into inline SVG icons -->
    <script>lucide.createIcons();</script>

    <!-- SweetAlert2 + Parkly Custom Alerts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/alerts.js"></script>

</body>

</html>
