<!DOCTYPE html>
<!-- Owner dashboard — protected route, accessible only to owner accounts.
     Lets owners manage spots, view reservations, check analytics, and publish new spots
     through a multi-step wizard. owner.js powers all of the dashboard logic. -->
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard - PARKLY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="IA/chatbox.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-background text-foreground min-h-screen font-sans antialiased">

    <header class="sticky top-0 z-50 border-b border-border bg-background/80 backdrop-blur-xl px-6 py-4">
        <nav class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 font-bold text-xl text-foreground group">
                <i data-lucide="circle-parking" class="text-primary group-hover:rotate-12 transition-transform"></i>
                <span class="tracking-tighter uppercase italic">PARK<span class="text-primary">LY</span></span>
            </a>

            <div class="flex items-center gap-6">
                <button id="theme-toggle" aria-label="Toggle theme"
                    class="p-2 rounded-lg border border-border hover:border-primary/50 transition-colors">
                    <i data-lucide="moon" class="w-4 h-4 text-foreground font-medium"></i>
                </button>
                <div class="flex items-center gap-2 border border-border rounded-full px-3 py-1 bg-card">
                    <span class="text-xs font-bold text-foreground uppercase tracking-tighter">Owner</span>
                </div>

                <!-- Profile Dropdown -->
                <div class="relative">
                    <button id="profile-pill"
                        class="flex items-center gap-2 border border-border rounded-full pl-1 pr-3 py-1 bg-card hover:border-primary/50 transition-colors"
                        role="status" aria-label="Account menu">
                        <div
                            class="w-6 h-6 rounded-full overflow-hidden flex items-center justify-center text-[10px] font-black text-foreground flex-shrink-0 bg-gradient-avatar">
                            <img id="nav-avatar-img" src="" alt="" class="hidden w-full h-full object-cover">
                            <span id="nav-avatar-text">?</span>
                        </div>
                        <span id="nav-username" class="text-xs font-bold text-foreground">Guest</span>
                        <i data-lucide="chevron-down" class="w-3 h-3 text-foreground/90 font-medium"></i>
                    </button>

                    <div id="profile-dropdown"
                        class="hidden absolute right-0 mt-2 w-48 bg-card border border-border rounded-2xl shadow-2xl py-2 z-50 animate-fade-in">
                        <a href="profile.html"
                            class="flex items-center gap-3 px-4 py-2.5 text-sm text-foreground/90 font-medium dark:hover:bg-border hover:bg-primary/5 hover:text-foreground dark:hover:text-foreground transition-colors">
                            <i data-lucide="user" class="w-4 h-4"></i> Profile
                        </a>
                        <a id="nav-link-bookings" href="owner-dash.html"
                            class="flex items-center gap-3 px-4 py-2.5 text-sm text-primary bg-primary/10 font-bold border-l-2 border-primary">
                            <i data-lucide="layout-dashboard" class="w-4 h-4"></i> My Control Panel
                        </a>
                        <a href="chat.html"
                            class="flex items-center gap-3 px-4 py-2.5 text-sm text-foreground/90 font-medium dark:hover:bg-border hover:bg-primary/5 hover:text-foreground dark:hover:text-foreground transition-colors">
                            <i data-lucide="message-square" class="w-4 h-4"></i> Messages
                        </a>
                        <hr class="border-border my-1">
                        <button id="btn-logout"
                            class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-red-600 dark:text-red-400 hover:bg-red-900/10 transition-colors text-left font-bold">
                            <i data-lucide="log-out" class="w-4 h-4"></i> Log out
                        </button>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <!-- ── OWNER DASHBOARD MAIN WRAPPER ─────────────────────────────────────── -->
    <main id="owner-main-content" class="max-w-7xl mx-auto px-6 py-10">

        <!-- Default view when dashboard loads. The publish wizard sits in a hidden div below this one. -->
        <div id="view-dashboard" class="animate-fade-in">
            <header class="mb-10 flex justify-between items-end">
                <div>
                    <h1 class="text-4xl font-extrabold text-foreground mb-2 tracking-tight">Hello, Owner</h1>
                    <p class="text-foreground font-medium opacity-80">Manage your spaces, reservations and earnings
                        here.</p>
                </div>
                <button id="btn-main-publish"
                    class="bg-primary text-primary-foreground px-6 py-3 rounded-xl font-bold flex items-center gap-2 shadow-lg shadow-primary/20 hover:scale-105 transition-all">
                    <i data-lucide="plus-circle" class="h-5 w-5"></i> Publish Spot
                </button>
            </header>

            <!-- PQR / Help Section -->
            <section class="mb-10">
                <div
